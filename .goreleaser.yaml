# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy
builds:
  - id: "a2acli"
    main: ./cmd/a2acli
    binary: a2acli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # this name template makes the OS and Arch match what the install.sh expects
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: a2acli
    directory: Formula
    repository:
      owner: ghchinoy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ghchinoy/a2acli"
    description: "A standalone A2A v1.0 compliant command-line client"
    license: "Apache-2.0"
    install: |
      bin.install "a2acli"
    test: |
      system "#{bin}/a2acli", "--version"

nfpms:
  - id: a2acli
    package_name: a2acli
    homepage: "https://github.com/ghchinoy/a2acli"
    description: "A standalone A2A v1.0 compliant command-line client"
    license: "Apache-2.0"
    maintainer: "G. H. Chinoy <ghchinoy@gmail.com>"
    formats:
      - deb
      - rpm
    contents:
      - src: ./scripts/install.sh
        dst: /usr/share/doc/a2acli/install.sh

winget:
  - name: a2acli
    publisher: ghchinoy
    publisher_url: "https://github.com/ghchinoy"
    publisher_support_url: "https://github.com/ghchinoy/a2acli/issues"
    short_description: "A standalone A2A v1.0 compliant command-line client"
    license: "Apache-2.0"
    homepage: "https://github.com/ghchinoy/a2acli"
    package_identifier: ghchinoy.a2acli
    repository:
      owner: ghchinoy
      name: winget-pkgs
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      branch: "automated-ghchinoy.a2acli-{{.Version}}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: ghchinoy
    name: a2acli
