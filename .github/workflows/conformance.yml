name: Conformance CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout a2acli
        uses: actions/checkout@v4
        with:
          path: a2acli

      - name: Checkout a2a-go (TCK SUT)
        uses: actions/checkout@v4
        with:
          repository: a2aproject/a2a-go
          ref: v2.3.1  # Pinned SDK version matching a2acli's build
          path: a2a-go

      - name: Checkout a2a-simple (A2A test fixtures)
        uses: actions/checkout@v4
        with:
          repository: ghchinoy/a2a-experiments
          ref: main
          path: a2a-simple

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: a2acli/go.sum

      - name: Drop local replace directives from a2a-simple
        # a2a-simple/go.mod carries local replace directives (../github/a2a-go,
        # ../cloud-interactions-go) for developer convenience. These paths do not
        # exist in CI. Drop them so go mod download resolves from the module proxy.
        # The a2a-simple agent should migrate these to a gitignored go.work instead.
        run: |
          cd a2a-simple
          go mod edit -dropreplace=github.com/a2aproject/a2a-go/v2
          go mod edit -dropreplace=github.com/ghchinoy/cloud-interactions-go

      - name: Install dependencies (SUT and fixtures)
        run: |
          cd a2a-go && go mod download && cd ..
          cd a2a-simple && go mod download && cd ..
          cd a2acli && go mod download

      - name: Run A2A and A2UI e2e conformance tests
        run: |
          cd a2acli
          # Point the e2e tests to the pinned sibling checkouts.
          # GOLANG_PROTOBUF_REGISTRATION_CONFLICT is required because the SUT uses
          # both v0 and v1 protobufs which causes a namespace panic at runtime.
          GOLANG_PROTOBUF_REGISTRATION_CONFLICT=ignore A2A_GO_SRC=../../a2a-go A2A_SIMPLE_SRC=../../a2a-simple go test -v ./e2e/...
