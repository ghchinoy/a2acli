name: Conformance CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout a2acli
        uses: actions/checkout@v4
        with:
          path: a2acli

      - name: Checkout a2a-go (TCK SUT)
        uses: actions/checkout@v4
        with:
          repository: a2aproject/a2a-go
          ref: v2.3.1  # Pinned SDK version matching a2acli's build
          path: a2a-go

      - name: Checkout apex (A2UI server)
        uses: actions/checkout@v4
        with:
          repository: ghchinoy/apex
          ref: main    # Latest main containing the A2UI v1.0 / apex-2xl fix
          path: apex

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: a2acli/go.sum

      - name: Install dependencies (SUT and apex SUT)
        run: |
          cd a2a-go && go mod download && cd ..
          cd apex && go mod download && cd ..
          cd a2acli && go mod download

      - name: Run A2A and A2UI e2e conformance tests
        run: |
          cd a2acli
          # Point the e2e tests to the pinned sibling checkouts.
          # GOLANG_PROTOBUF_REGISTRATION_CONFLICT is required because the SUT uses
          # both v0 and v1 protobufs which causes a namespace panic at runtime.
          GOLANG_PROTOBUF_REGISTRATION_CONFLICT=ignore A2A_GO_SRC=../../a2a-go APEX_SRC=../../apex go test -v ./e2e/...
